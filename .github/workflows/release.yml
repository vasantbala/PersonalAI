name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish PersonalAI/PersonalAI.csproj -c Release -r win-x64 --self-contained true -o ./publish

      - name: Archive
        run: Compress-Archive -Path ./publish/* -DestinationPath PersonalAI-${{ github.ref_name }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PersonalAI-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
